name: Patch admin pages first

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update admin
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p = Path('admin.php')
          s = p.read_text(encoding='utf-8')
          tabs = '''<div class="tabs">
      <button class="tab active" data-tab="pages">Pages du site</button>
      <button class="tab" data-tab="settings">Nav + footer</button>
      <button class="tab" data-tab="preview">Previsualisation</button>
      <button class="tab" data-tab="texts">Accueil - textes avances</button>
      <button class="tab" data-tab="ctas">Accueil - boutons + liens</button>
      <button class="tab" data-tab="images">Accueil - images</button>
      <button class="tab" data-tab="booleans">Accueil - tableau</button>
      <button class="tab" data-tab="json">JSON</button>
    </div>

    <div class="card">'''
          s = re.sub(r'<div class="tabs">.*?</div>\s*\n\s*<div class="card">', tabs, s, count=1, flags=re.S)
          s = s.replace('<div class="section active" data-section="texts">', '<div class="section" data-section="texts">', 1)
          s = s.replace('<div class="section" data-section="pages">', '<div class="section active" data-section="pages">', 1)
          s = s.replace('let selectedPageSlug = null;', 'let selectedPageSlug = "home";', 1)
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit
        run: |
          git config user.name actions
          git config user.email actions@github.com
          git add admin.php
          git commit -m "Mettre Pages en premier dans l admin" || exit 0
          git push
